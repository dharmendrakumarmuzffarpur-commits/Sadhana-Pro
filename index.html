<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卐 साधना Pro 卐</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Premium Dark Theme */
        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --primary-yellow: #FACC15;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            background: var(--surface-color);
        }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-icon { background: var(--primary-yellow); color: #000; font-weight: bold; padding: 5px 10px; border-radius: 5px; }
        .logo-text { font-size: 20px; font-weight: bold; }
        .theme-toggle { background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 5px;}

        /* Input Section */
        .input-section {
            display: flex;
            justify-content: center;
            padding: 30px;
            gap: 15px;
            background: var(--bg-color);
        }
        .input-box {
            width: 60%;
            padding: 15px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        .input-box:focus { border-color: var(--primary-yellow); }
        .open-btn {
            background: var(--primary-yellow);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .open-btn:hover { opacity: 0.9; }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 0 30px;
            border-bottom: 1px solid var(--border-color);
            gap: 20px;
        }
        .tab {
            padding: 10px 5px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: bold;
        }
        .tab.active {
            color: var(--primary-yellow);
            border-bottom: 2px solid var(--primary-yellow);
        }

        /* Slideshow Controls (Hidden by default) */
        .slideshow-controls {
            display: none; /* Block in slideshow mode */
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px;
        }
        .slide-btn { background: var(--surface-color); color: #fff; border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 20px; cursor: pointer;}
        .slide-btn:hover { background: #333; }
        .video-counter { color: var(--text-muted); font-size: 14px; }

        /* Main Workspace */
        .main-content {
            display: flex;
            flex: 1;
            padding: 20px 30px;
            gap: 20px;
            overflow: hidden;
        }

        /* Video Area */
        .video-wrapper {
            flex: 2.5;
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* White Speed Controller Overlay (Clone of Screenshot) */
        .speed-overlay {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #FFFFFF;
            color: #000;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
            z-index: 10;
        }
        .speed-display { font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        .slider-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 20px;}
        .slider-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; font-weight:bold;}
        input[type=range] { flex: 1; accent-color: #000; }
        .presets { display: flex; justify-content: space-between; }
        .preset-btn { background: #f5f5f5; border: none; padding: 10px; border-radius: 50%; width: 45px; height: 45px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .preset-btn:hover, .preset-btn.active-speed { background: #e0e0e0; }

        /* Right Sidebar Panel */
        .info-panel {
            flex: 1;
            background: var(--surface-color);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
            overflow-y: auto;
        }
        .info-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; line-height: 1.4; }
        .info-meta { color: var(--text-muted); font-size: 14px; margin-bottom: 15px; }
        .info-desc { font-size: 14px; color: #ccc; line-height: 1.6; white-space: pre-wrap; }
        
        /* Floating Speed Button */
        .toggle-speed-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 5;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <script>
        const SECRET = "Ashish Mahajan";
        // LocalStorage Memory: Ek baar login kiya toh yaad rakhega
        if(localStorage.getItem('sadhana_auth') !== 'true') {
            let user = prompt("卐 साधना Pro 卐: Kripya Password Daalein:");
            if(user === SECRET) {
                localStorage.setItem('sadhana_auth', 'true');
            } else {
                document.body.innerHTML = "<h2 style='color:#ef4444; text-align:center; margin-top:20%;'>❌ Access Denied!</h2>";
                throw new Error("Wrong Password");
            }
        }
    </script>

    <header>
        <div class="logo-container">
            <div class="logo-icon">SP</div>
            <div class="logo-text">卐 साधना Pro</div>
        </div>
        <button class="theme-toggle">🌙 Dark</button>
    </header>

    <div class="input-section">
        <input type="text" id="urlInput" class="input-box" placeholder="Paste any YouTube video or playlist URL...">
        <button class="open-btn" onclick="loadContent()">Open playlist</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-list" onclick="switchTab('list')">List</div>
        <div class="tab" id="tab-slideshow" onclick="switchTab('slideshow')">Slideshow</div>
    </div>

    <div class="slideshow-controls" id="slideshow-ctrl">
        <button class="slide-btn" onclick="prevVideo()">‹ Prev</button>
        <span class="video-counter" id="vid-counter">Video Loader</span>
        <button class="slide-btn" onclick="nextVideo()">Next ›</button>
    </div>

    <div class="main-content" id="workspace">
        
        <div class="video-wrapper">
            <button class="toggle-speed-btn" onclick="toggleSpeedBox()">⚙️ Speed</button>
            <div id="player"></div>

            <div class="speed-overlay" id="speedBox">
                <div class="speed-display" id="speedText">1.00x</div>
                <div class="slider-row">
                    <button class="slider-btn" onclick="adjustSlider(-0.25)">-</button>
                    <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1" oninput="setSpeed(this.value)">
                    <button class="slider-btn" onclick="adjustSlider(0.25)">+</button>
                </div>
                <div class="presets">
                    <button class="preset-btn" onclick="setSpeed(1)">1x<br><span style="font-size:9px; font-weight:normal;">Normal</span></button>
                    <button class="preset-btn" onclick="setSpeed(1.25)">1.25x</button>
                    <button class="preset-btn" onclick="setSpeed(1.5)">1.5x</button>
                    <button class="preset-btn" onclick="setSpeed(2)">2x</button>
                    <button class="preset-btn" onclick="setSpeed(3)">3x</button>
                    <button class="preset-btn" onclick="setSpeed(4)">4x<br><span style="font-size:9px; font-weight:normal;">Recent</span></button>
                </div>
            </div>
        </div>

        <div class="info-panel" id="sidebar">
            <div class="info-title" id="vidTitle">Aapki Class Yahan Load Hogi...</div>
            <div class="info-meta">Sadhana Pro • No Distractions</div>
            <div class="info-desc">
                📌 Padhai ka samay shuru ho chuka hai. 
                📌 Apni YouTube Playlist ka link upar daalein.
                📌 Slideshow mode ke liye upar tab par click karein.
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isPlaylist = false;

        // Background Data Caching (Pichla link yaad rakhna)
        window.onload = () => {
            let savedLink = localStorage.getItem('sadhana_last_link');
            if(savedLink) {
                document.getElementById('urlInput').value = savedLink;
                // Hum turant load nahi kar rahe taaki API ready ho jaye, user 'Open' dabayega.
            }
        };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                host: 'https://www.youtube-nocookie.com',
                playerVars: { 
                    'autoplay': 1, 
                    'rel': 0, 
                    'modestbranding': 1,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // Player ready
        }

        function onPlayerStateChange(event) {
            if(event.data == YT.PlayerState.PLAYING) {
                let data = player.getVideoData();
                document.getElementById('vidTitle').innerText = data.title || "Lecture Playing...";
                
                if(isPlaylist) {
                    let index = player.getPlaylistIndex() + 1;
                    let arr = player.getPlaylist();
                    let total = arr ? arr.length : 0;
                    document.getElementById('vid-counter').innerText = `Video ${index} / ${total}`;
                } else {
                    document.getElementById('vid-counter').innerText = "Single Video";
                }
            }
        }

        function loadContent() {
            let url = document.getElementById('urlInput').value;
            if(!url) return;
            
            // Memory mein Save (Background Storage)
            localStorage.setItem('sadhana_last_link', url);

            let listId = extractPlaylistID(url);
            let vidId = extractVideoID(url);

            if(listId) {
                isPlaylist = true;
                player.loadPlaylist({list: listId});
            } else if(vidId) {
                isPlaylist = false;
                player.loadVideoById(vidId);
            } else {
                alert("Sahi YouTube Link Daalein!");
            }
        }

        // Tab Switching Logic (List vs Slideshow)
        function switchTab(mode) {
            document.getElementById('tab-list').classList.remove('active');
            document.getElementById('tab-slideshow').classList.remove('active');
            
            if(mode === 'list') {
                document.getElementById('tab-list').classList.add('active');
                document.getElementById('sidebar').style.display = 'block';
                document.getElementById('slideshow-ctrl').style.display = 'none';
            } else {
                document.getElementById('tab-slideshow').classList.add('active');
                document.getElementById('sidebar').style.display = 'none'; // Sidebar hide for focus
                document.getElementById('slideshow-ctrl').style.display = 'flex';
            }
        }

        // Playlist Prev/Next Controls
        function nextVideo() { if(isPlaylist) player.nextVideo(); }
        function prevVideo() { if(isPlaylist) player.previousVideo(); }

        // Speed Controller Logic
        function toggleSpeedBox() {
            let box = document.getElementById('speedBox');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function setSpeed(rate) {
            rate = parseFloat(rate);
            document.getElementById('speedSlider').value = rate;
            document.getElementById('speedText').innerText = rate.toFixed(2) + "x";
            
            if(rate > 2) {
                alert("Reality Check: 3x aur 4x speed ke liye Kiwi Browser + Video Speed Controller extension zaroori hai. Official player max 2x hi lega.");
            }
            if(player && player.setPlaybackRate) player.setPlaybackRate(rate);
        }

        function adjustSlider(change) {
            let current = parseFloat(document.getElementById('speedSlider').value);
            let newVal = current + change;
            if(newVal >= 0.25 && newVal <= 4) setSpeed(newVal);
        }

        // URL Extractors
        function extractVideoID(url) {
            let regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }
        function extractPlaylistID(url) {
            let reg = /[?&]list=([^#\&\?]+)/;
            let match = url.match(reg);
            return match ? match[1] : null;
        }
        
        // PWA Service Worker Registration (Taaki App jaisa install ho)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function() {
                console.log('Service Worker Registered - Background Caching On');
            });
        }
    </script>
</body>
</html>
