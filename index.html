<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卐 साधना Pro Max 卐</title>
    <style>
        :root { --main: #FACC15; --bg: #000; --card: #1A1A1A; --text: #FFF; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-y: auto; }
        
        /* Header & Controls */
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 100; }
        .input-group { padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #111; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-size: 16px; }
        
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-main { background: var(--main); color: #000; }
        .btn-switch { background: #334155; color: #fff; }
        
        /* Player Container */
        .player-container { width: 100%; position: relative; padding-top: 56.25%; /* 16:9 Aspect Ratio */ background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Speed & Engine Info */
        .status-bar { padding: 10px; background: #1A1A1A; display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px solid #333; }
        .engine-tag { color: var(--main); font-weight: bold; }

        /* Speed Controls */
        .speed-box { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #111; scrollbar-width: none; }
        .speed-btn { background: #222; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; min-width: 60px; }
        .speed-btn.active { border-color: var(--main); color: var(--main); }

        /* Description/Playlist Sidebar (Mobile Friendly) */
        .content-info { padding: 20px; }
        .info-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        
        /* Fullscreen Overlay Fix */
        :-webkit-full-screen { width: 100%; height: 100%; }
    </style>
</head>
<body>

<script>
    const PASS = "Ashish Mahajan";
    if(localStorage.getItem('auth') !== 'true') {
        let entry = prompt("卐 साधना 卐 : Password Daalein");
        if(entry === PASS) { localStorage.setItem('auth', 'true'); }
        else { document.body.innerHTML = "<h2 style='text-align:center; padding:50px;'>Galat Password! Reload karein.</h2>"; window.stop(); }
    }
</script>

<header>
    <div style="font-size: 22px; font-weight: bold; color: var(--main);">卐 साधना Pro Max</div>
</header>

<div class="input-group">
    <input type="text" id="url" placeholder="YouTube Video ya Playlist Link...">
    <div class="btn-row">
        <button class="btn btn-main" onclick="play('official')">Official Mode</button>
        <button class="btn btn-switch" onclick="play('study')">Study Mode (3x)</button>
    </div>
</div>

<div class="status-bar">
    <span>Engine: <span id="engine-name" class="engine-tag">Waiting...</span></span>
    <span id="full-hint">Full Screen Allowed ✅</span>
</div>

<div class="player-container" id="player-box">
    <div style="position:absolute; top:45%; left:30%; color:#555;">Link dalkar Mode chunein...</div>
</div>

<div class="speed-box" id="speed-controls">
    <button class="speed-btn" onclick="setSp(1)">1x</button>
    <button class="speed-btn" onclick="setSp(1.5)">1.5x</button>
    <button class="speed-btn active" onclick="setSp(2)">2x</button>
    <button class="speed-btn" onclick="setSp(2.5)">2.5x</button>
    <button class="speed-btn" onclick="setSp(3)">3x</button>
    <button class="speed-btn" onclick="setSp(4)">4x</button>
</div>

<div class="content-info">
    <div class="info-card">
        <h3 id="v-title" style="margin-top:0; color:var(--main);">Kaise use karein?</h3>
        <p id="v-desc" style="font-size:14px; color:#aaa; line-height:1.6;">
            1. <b>Official Mode:</b> Isme aapka YouTube Premium kaam karega.<br>
            2. <b>Study Mode:</b> Isme bina login ke 3x-4x speed aur No Ads honge.<br>
            3. <b>Full Screen:</b> Video ke andar square box par click karein.
        </p>
    </div>
</div>

<script>
    let currentMode = 'official';

    function play(mode) {
        let url = document.getElementById('url').value;
        let player = document.getElementById('player-box');
        let engineTxt = document.getElementById('engine-name');
        let id = "";
        
        if(!url) { alert("Pehle link toh daalo bhai!"); return; }

        // Extract ID
        if(url.includes('list=')) id = url.split('list=')[1].split('&')[0];
        else if(url.includes('v=')) id = url.split('v=')[1].split('&')[0];
        else { alert("Invalid YouTube Link!"); return; }

        if(mode === 'official') {
            engineTxt.innerText = "YouTube Official";
            let src = url.includes('list=') ? 
                `https://www.youtube.com/embed/videoseries?list=${id}` : 
                `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`;
            player.innerHTML = `<iframe src="${src}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            engineTxt.innerText = "Study Engine (Piped)";
            let src = url.includes('list=') ? 
                `https://piped.video/embed/playlists/${id}` : 
                `https://piped.video/embed/${id}`;
            player.innerHTML = `<iframe src="${src}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        }
        
        document.getElementById('v-title').innerText = "Video Loading...";
        document.getElementById('v-desc').innerText = "Agar video load na ho, toh mode switch karke dekhein.";
    }

    function setSp(s) {
        alert("Speed " + s + "x request bheji gayi. Study Mode mein ye player ke andar se bhi ho jayega.");
    }
</script>

</body>
</html>
